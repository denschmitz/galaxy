target:
  name: Orion Nebula
  region:
    kind: circle
    radius_arcmin: 12.0

search:
  missions: ["HST", "JWST"]
  instruments: []
  detectors: []
  filters: []
  product_types: ["SCIENCE", "DRZ", "DRC", "I2D"]
  observation_date_start: null
  observation_date_end: null

canvas:
  center:
    mode: resolved_target
  projection: TAN
  pixel_scale_arcsec: 0.08
  width: 2400
  height: 2400
  rotation_deg: 0.0
  flux_conserving: true

planes:
  enabled_filters: []
  disabled_plane_ids: []
  export_multiplane_fits: true

mapping:
  defaults:
    strategy: wavelength_order
  channels:
    red: []
    green: []
    blue: []
  derived_planes: []

tone:
  stretch:
    red:
      kind: asinh
      parameter: 4.0
    green:
      kind: asinh
      parameter: 4.0
    blue:
      kind: asinh
      parameter: 4.0
  percentiles:
    black: 1.0
    white: 99.5
  gain:
    red: 1.0
    green: 1.0
    blue: 1.0
  bias:
    red: 0.0
    green: 0.0
    blue: 0.0
  saturation: 1.0

psf:
  enabled: false
  common_psf_fwhm_arcsec: null
  per_plane: {}

execution:
  fail_fast: false
  preview_downsample: 4
  overwrite_outputs: true

