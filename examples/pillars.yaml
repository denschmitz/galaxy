target:
  name: Pillars of Creation
  # Known approximate center of the Pillars of Creation.
  ra_deg: 274.7003
  dec_deg: -13.8067
  region:
    # Sky search box in arcminutes. Edit these to change the crop on the sky.
    kind: box
    width_arcmin: 1.5
    height_arcmin: 1.5

search:
  missions: ["HST", "JWST"]
  instruments: []
  detectors: []
  filters: ["F090W", "F200W", "F444W", "F502N", "F657N", "F673N"]
  product_types: ["SCIENCE", "DRZ", "DRC", "I2D"]
  observation_date_start: null
  observation_date_end: null
  observation_selection: deepest_per_filter
  max_observations_per_filter: 1

canvas:
  center:
    mode: explicit
    ra_deg: 274.7003
    dec_deg: -13.8067
  projection: TAN
  # Output raster size. Edit width/height directly to change output resolution.
  pixel_scale_arcsec: 0.08
  width: 5000
  height: 5000
  rotation_deg: 0.0
  flux_conserving: true

planes:
  enabled_filters: ["F090W", "F200W", "F444W", "F502N", "F657N", "F673N"]
  disabled_plane_ids: []
  export_multiplane_fits: true

mapping:
  defaults:
    strategy: wavelength_order
  channels:
    red: []
    green: []
    blue: []
  derived_planes: []

tone:
  stretch:
    red:
      kind: asinh
      parameter: 5.0
    green:
      kind: asinh
      parameter: 4.5
    blue:
      kind: asinh
      parameter: 4.0
  percentiles:
    black: 0.5
    white: 99.7
  gain:
    red: 1.0
    green: 1.0
    blue: 1.05
  bias:
    red: 0.0
    green: 0.0
    blue: 0.0
  saturation: 1.15

psf:
  enabled: false
  common_psf_fwhm_arcsec: null
  per_plane: {}

execution:
  fail_fast: false
